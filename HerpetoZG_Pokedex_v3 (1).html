<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerpetoZG — Reptiles & Amphibiens de Zagreb</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --panel: #0d1426; --card: #111827;
    --accent: #00ff88; --accent2: #00cfff; --accent3: #ff6b35;
    --locked: #1a2035; --locked-text: #2a3a55;
    --text: #c8d8e8; --text-dim: #4a6080; --border: #1e3050;
    --glow: 0 0 20px rgba(0,255,136,0.35);
    --glow2: 0 0 20px rgba(0,207,255,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Exo 2',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* scanlines */
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px); pointer-events:none; z-index:1000; }
  body::after { content:''; position:fixed; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.25; animation:scanBeam 8s linear infinite; z-index:999; pointer-events:none; }
  @keyframes scanBeam { 0%{top:-3px} 100%{top:100vh} }

  /* ═══ UNLOCK OVERLAY ═══ */
  #unlock-overlay {
    position:fixed; inset:0; z-index:2000;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0;
  }
  #unlock-overlay.active { pointer-events:all; }

  .unlock-bg {
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center, rgba(0,255,136,0.15) 0%, rgba(0,0,0,0.95) 70%);
    opacity:0;
    animation-fill-mode:forwards;
  }

  .unlock-particles {
    position:absolute; inset:0; overflow:hidden;
  }
  .particle {
    position:absolute; width:4px; height:4px;
    background:var(--accent); border-radius:50%;
    opacity:0;
  }

  .unlock-card {
    position:relative; z-index:10;
    width:320px;
    background:var(--panel);
    border:2px solid var(--accent);
    box-shadow: var(--glow), 0 0 100px rgba(0,255,136,0.2);
    transform:scale(0.3) rotateY(180deg);
    opacity:0;
    animation-fill-mode:forwards;
  }
  .unlock-card::before {
    content:''; position:absolute; top:-2px; left:20px;
    width:60%; height:2px;
    background:linear-gradient(90deg,var(--accent),transparent);
  }

  .unlock-badge {
    position:absolute; top:-16px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#000;
    font-family:'Orbitron',monospace; font-size:0.6rem; font-weight:900;
    letter-spacing:3px; padding:4px 16px; white-space:nowrap;
  }

  .unlock-img-area {
    height:200px; overflow:hidden; position:relative;
    background:linear-gradient(135deg,#0d1a2a,#0a1220);
    display:flex; align-items:center; justify-content:center;
  }
  .unlock-img-area img {
    width:100%; height:100%; object-fit:cover;
    opacity:0; transition:opacity 0.5s;
  }
  .unlock-img-area img.loaded { opacity:1; }
  .unlock-emoji-big {
    position:absolute; font-size:5rem;
    filter:drop-shadow(0 0 30px rgba(0,255,136,0.8));
    animation:floatBig 2s ease-in-out infinite;
  }
  @keyframes floatBig { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-12px) scale(1.05)} }

  .unlock-scan-line {
    position:absolute; left:0; right:0; height:3px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    animation:scanCard 1.5s ease-in-out infinite;
    opacity:0.8;
  }
  @keyframes scanCard { 0%{top:0} 100%{top:100%} }

  .unlock-info { padding:16px 20px; }
  .unlock-number { font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--accent); letter-spacing:3px; margin-bottom:4px; }
  .unlock-name { font-family:'Orbitron',monospace; font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:3px; }
  .unlock-latin { font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--text-dim); font-style:italic; margin-bottom:10px; }

  .unlock-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .unlock-stat { border:1px solid var(--border); padding:6px 10px; }
  .unlock-stat-label { font-family:'Share Tech Mono',monospace; font-size:0.5rem; color:var(--text-dim); letter-spacing:2px; margin-bottom:2px; }
  .unlock-stat-value { font-size:0.75rem; font-weight:600; color:var(--text); }

  .unlock-btn-close {
    width:100%; padding:10px;
    background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,207,255,0.1));
    border:1px solid var(--accent); color:var(--accent);
    font-family:'Orbitron',monospace; font-size:0.65rem; font-weight:700;
    letter-spacing:3px; cursor:pointer; transition:all 0.3s;
    box-shadow:var(--glow);
  }
  .unlock-btn-close:hover { background:linear-gradient(135deg,rgba(0,255,136,0.2),rgba(0,207,255,0.2)); }

  /* ring burst */
  .ring-burst {
    position:absolute; width:400px; height:400px;
    border-radius:50%; border:2px solid var(--accent);
    opacity:0; transform:scale(0);
    animation-fill-mode:forwards;
  }

  /* ═══ HEADER ═══ */
  header { padding:18px 24px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:relative; overflow:hidden; flex-wrap:wrap; gap:14px; }
  header::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,255,136,0.04) 0%,transparent 60%); }
  .logo-main { font-family:'Orbitron',monospace; font-weight:900; font-size:1.7rem; letter-spacing:4px; color:var(--accent); text-shadow:var(--glow); }
  .logo-sub { font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--text-dim); letter-spacing:3px; margin-top:2px; }
  .header-right { display:flex; gap:18px; align-items:center; }
  .stat-box { text-align:center; border:1px solid var(--border); padding:7px 14px; position:relative; }
  .stat-box::before { content:''; position:absolute; top:-1px; left:8px; width:30%; height:1px; background:var(--accent); }
  .stat-num { font-family:'Orbitron',monospace; font-size:1.5rem; font-weight:700; color:var(--accent); text-shadow:var(--glow); }
  .stat-label { font-family:'Share Tech Mono',monospace; font-size:0.58rem; color:var(--text-dim); letter-spacing:2px; }
  .progress-ring-container { position:relative; width:68px; height:68px; }
  .progress-ring { transform:rotate(-90deg); }
  .progress-ring-bg { fill:none; stroke:var(--border); stroke-width:4; }
  .progress-ring-fill { fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round; stroke-dasharray:197; stroke-dashoffset:197; filter:drop-shadow(0 0 6px var(--accent)); transition:stroke-dashoffset 1.2s ease; }
  .progress-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .progress-pct { font-family:'Orbitron',monospace; font-size:0.85rem; font-weight:700; color:var(--accent); }
  .progress-lbl { font-family:'Share Tech Mono',monospace; font-size:0.42rem; color:var(--text-dim); letter-spacing:1px; }

  /* ═══ FILTERS ═══ */
  .filters { padding:10px 24px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .filter-label { font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--text-dim); letter-spacing:2px; }
  .filter-btn { font-family:'Share Tech Mono',monospace; font-size:0.62rem; letter-spacing:1px; padding:5px 13px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
  .filter-btn:hover,.filter-btn.active { border-color:var(--accent); color:var(--accent); box-shadow:inset 0 0 10px rgba(0,255,136,0.07); }
  .filter-btn.active::before { content:'▶ '; }
  .search-box { margin-left:auto; font-family:'Share Tech Mono',monospace; font-size:0.62rem; padding:5px 13px; border:1px solid var(--border); background:transparent; color:var(--text); outline:none; transition:border-color 0.2s; width:190px; }
  .search-box::placeholder { color:var(--text-dim); }
  .search-box:focus { border-color:var(--accent2); }

  /* ═══ GRID ═══ */
  .grid-container { padding:18px 24px; display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:13px; }

  .card { border:1px solid var(--border); background:var(--card); position:relative; cursor:pointer; transition:all 0.3s; overflow:hidden; aspect-ratio:3/4; display:flex; flex-direction:column; }
  .card::before { content:''; position:absolute; top:-1px; left:12px; width:40%; height:2px; }
  .card.unlocked::before { background:var(--accent); }
  .card.locked::before { background:var(--locked-text); }
  .card.unlocked:hover { border-color:var(--accent); box-shadow:var(--glow),inset 0 0 30px rgba(0,255,136,0.04); transform:translateY(-3px); }
  .card.locked { background:var(--locked); }

  .card-number { position:absolute; top:8px; right:10px; font-family:'Share Tech Mono',monospace; font-size:0.58rem; color:var(--text-dim); z-index:2; }
  .card.unlocked .card-number { color:var(--accent); opacity:0.6; }

  .card-img { flex:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background:linear-gradient(135deg,#0d1a2a,#0a1220); }
  .card-img img { width:100%; height:100%; object-fit:cover; }
  .card.unlocked .card-img::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 55%,var(--card) 100%); pointer-events:none; }
  .species-emoji { font-size:3.2rem; filter:drop-shadow(0 0 14px rgba(0,255,136,0.4)); animation:float 3s ease-in-out infinite; z-index:1; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .locked-question { position:absolute; font-family:'Orbitron',monospace; font-size:2.6rem; font-weight:900; color:var(--locked-text); }
  .locked-icon { font-size:1.8rem; opacity:0.1; }

  .card-info { padding:9px 11px; border-top:1px solid var(--border); background:var(--panel); }
  .card.locked .card-info { border-top-color:#1a2535; background:#0d1220; }
  .card-name { font-size:0.75rem; font-weight:600; color:var(--text); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card.locked .card-name { color:var(--locked-text); }
  .card-latin { font-family:'Share Tech Mono',monospace; font-size:0.52rem; color:var(--text-dim); font-style:italic; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card.locked .card-latin { color:#1e2e45; }
  .card-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .tag { font-family:'Share Tech Mono',monospace; font-size:0.48rem; letter-spacing:1px; padding:2px 6px; border:1px solid; text-transform:uppercase; }
  .tag-reptile { border-color:#ff6b35; color:#ff6b35; background:rgba(255,107,53,0.08); }
  .tag-amphibien { border-color:var(--accent2); color:var(--accent2); background:rgba(0,207,255,0.08); }
  .tag-invasive { border-color:#ff3366; color:#ff3366; background:rgba(255,51,102,0.08); }
  .tag-locked { border-color:#1e2e45; color:#1e2e45; }

  /* photo badge */
  .photo-badge { position:absolute; bottom:8px; right:8px; z-index:3; background:rgba(0,255,136,0.15); border:1px solid var(--accent); border-radius:2px; padding:2px 6px; font-family:'Share Tech Mono',monospace; font-size:0.48rem; color:var(--accent); letter-spacing:1px; }

  /* ═══ DETAIL MODAL ═══ */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(6px); }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { width:92%; max-width:560px; background:var(--panel); border:1px solid var(--accent); box-shadow:var(--glow),0 0 80px rgba(0,255,136,0.08); position:relative; transform:scale(0.9); transition:transform 0.3s; max-height:90vh; overflow-y:auto; }
  .modal-overlay.open .modal { transform:scale(1); }
  .modal::before { content:''; position:absolute; top:-1px; left:20px; width:50%; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }

  .modal-photo { width:100%; height:220px; overflow:hidden; position:relative; background:linear-gradient(135deg,#0d1a2a,#0a1220); display:flex; align-items:center; justify-content:center; }
  .modal-photo img { width:100%; height:100%; object-fit:cover; }
  .modal-photo-emoji { font-size:4rem; filter:drop-shadow(0 0 20px rgba(0,255,136,0.5)); }
  .modal-photo-overlay { position:absolute; inset:0; background:linear-gradient(180deg,transparent 50%,var(--panel) 100%); }

  /* upload zone inside modal */
  .photo-upload-zone {
    margin:0 22px 0; border:1px dashed var(--border);
    padding:14px; text-align:center; cursor:pointer;
    transition:all 0.3s; position:relative; overflow:hidden;
  }
  .photo-upload-zone:hover { border-color:var(--accent); background:rgba(0,255,136,0.04); }
  .photo-upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
  .photo-upload-label { font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--text-dim); letter-spacing:2px; }
  .photo-upload-label span { color:var(--accent); }

  .modal-header { padding:16px 22px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  .modal-emoji-sm { font-size:2.5rem; filter:drop-shadow(0 0 12px rgba(0,255,136,0.4)); }
  .modal-number { font-family:'Share Tech Mono',monospace; font-size:0.58rem; color:var(--accent); letter-spacing:3px; margin-bottom:3px; }
  .modal-name { font-family:'Orbitron',monospace; font-size:1rem; font-weight:700; color:var(--text); margin-bottom:2px; }
  .modal-latin { font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--text-dim); font-style:italic; }

  .modal-body { padding:14px 22px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-field { border:1px solid var(--border); padding:8px 11px; position:relative; }
  .modal-field::before { content:''; position:absolute; top:-1px; left:8px; width:16px; height:1px; background:var(--accent2); }
  .modal-field-label { font-family:'Share Tech Mono',monospace; font-size:0.5rem; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
  .modal-field-value { font-size:0.78rem; font-weight:600; color:var(--text); }
  .modal-desc { grid-column:1/-1; border:1px solid var(--border); padding:10px 11px; }
  .modal-desc .modal-field-value { font-weight:400; font-size:0.75rem; line-height:1.65; color:var(--text-dim); }

  .modal-close { position:absolute; top:12px; right:14px; background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'Share Tech Mono',monospace; font-size:0.62rem; padding:3px 10px; cursor:pointer; letter-spacing:1px; transition:all 0.2s; z-index:2; }
  .modal-close:hover { border-color:var(--accent); color:var(--accent); }

  .unlock-from-modal-btn { margin:0 22px 18px; width:calc(100% - 44px); padding:10px; background:linear-gradient(135deg,rgba(0,255,136,0.08),rgba(0,207,255,0.08)); border:1px solid var(--accent); color:var(--accent); font-family:'Orbitron',monospace; font-size:0.65rem; font-weight:700; letter-spacing:3px; cursor:pointer; transition:all 0.3s; box-shadow:var(--glow); }
  .unlock-from-modal-btn:hover { background:linear-gradient(135deg,rgba(0,255,136,0.18),rgba(0,207,255,0.18)); }

  /* corners */
  .corner-tl,.corner-br { position:fixed; width:34px; height:34px; pointer-events:none; z-index:100; }
  .corner-tl { top:0; left:0; border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
  .corner-br { bottom:0; right:0; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }
  .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; font-family:'Share Tech Mono',monospace; color:var(--text-dim); font-size:0.75rem; letter-spacing:2px; }
</style>
</head>
<body>
<div class="corner-tl"></div>
<div class="corner-br"></div>

<!-- ═══ UNLOCK ANIMATION OVERLAY ═══ -->
<div id="unlock-overlay">
  <div class="unlock-bg" id="unlock-bg"></div>
  <div class="unlock-particles" id="unlock-particles"></div>
  <div class="ring-burst" id="ring1"></div>
  <div class="ring-burst" id="ring2" style="width:600px;height:600px;border-color:rgba(0,207,255,0.4)"></div>
  <div class="unlock-card" id="unlock-card">
    <div class="unlock-badge">// NOUVELLE ESPÈCE DÉCOUVERTE</div>
    <div class="unlock-img-area" id="unlock-img-area">
      <div class="unlock-scan-line"></div>
      <div class="unlock-emoji-big" id="unlock-emoji-big"></div>
      <img id="unlock-photo" src="" alt="">
    </div>
    <div class="unlock-info">
      <div class="unlock-number" id="unlock-number"></div>
      <div class="unlock-name" id="unlock-name"></div>
      <div class="unlock-latin" id="unlock-latin"></div>
      <div class="unlock-stats">
        <div class="unlock-stat"><div class="unlock-stat-label">Habitat</div><div class="unlock-stat-value" id="unlock-habitat"></div></div>
        <div class="unlock-stat"><div class="unlock-stat-label">Taille</div><div class="unlock-stat-value" id="unlock-taille"></div></div>
      </div>
      <button class="unlock-btn-close" id="unlock-close-btn" onclick="closeUnlockAnim()">⬡ AJOUTER AU POKÉDEX</button>
    </div>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo">
    <div class="logo-main">HERPETO<span style="color:var(--accent2)">ZG</span></div>
    <div class="logo-sub">// REPTILES & AMPHIBIENS — ZAGREB, CROATIE</div>
  </div>
  <div class="header-right">
    <div class="stat-box"><div class="stat-num" id="discovered-count">0</div><div class="stat-label">Découvertes</div></div>
    <div class="stat-box"><div class="stat-num" id="total-count">29</div><div class="stat-label">Total</div></div>
    <div class="progress-ring-container">
      <svg class="progress-ring" width="68" height="68" viewBox="0 0 68 68">
        <circle class="progress-ring-bg" cx="34" cy="34" r="29"/>
        <circle class="progress-ring-fill" id="progress-circle" cx="34" cy="34" r="29"/>
      </svg>
      <div class="progress-text"><div class="progress-pct" id="progress-pct">0%</div><div class="progress-lbl">COMPLET</div></div>
    </div>
  </div>
</header>

<!-- ═══ FILTERS ═══ -->
<div class="filters">
  <span class="filter-label">// FILTRE :</span>
  <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('reptile',this)">Reptiles</button>
  <button class="filter-btn" onclick="setFilter('amphibien',this)">Amphibiens</button>
  <button class="filter-btn" onclick="setFilter('invasive',this)">Invasives</button>
  <button class="filter-btn" onclick="setFilter('unlocked',this)">Découvertes</button>
  <button class="filter-btn" onclick="setFilter('locked',this)">À trouver</button>
  <input class="search-box" id="search" placeholder="// RECHERCHER..." oninput="renderGrid()">
</div>

<!-- ═══ GRID ═══ -->
<div class="grid-container" id="grid"></div>

<!-- ═══ DETAIL MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕ FERMER</button>
    <div class="modal-photo" id="modal-photo-area">
      <div class="modal-photo-emoji" id="modal-photo-emoji"></div>
      <img id="modal-photo-img" src="" alt="" style="display:none">
      <div class="modal-photo-overlay"></div>
    </div>
    <!-- Photo upload zone (only for unlocked) -->
    <div class="photo-upload-zone" id="photo-upload-zone" style="display:none">
      <input type="file" accept="image/*" id="photo-file-input" onchange="handlePhotoUpload(event)">
      <div class="photo-upload-label">📷 <span>CLIQUER POUR AJOUTER UNE PHOTO</span><br>ou glisser-déposer une image</div>
    </div>
    <div class="modal-header">
      <div class="modal-emoji-sm" id="modal-emoji-sm"></div>
      <div>
        <div class="modal-number" id="modal-number"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-latin" id="modal-latin"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-field"><div class="modal-field-label">Type</div><div class="modal-field-value" id="modal-type"></div></div>
      <div class="modal-field"><div class="modal-field-label">Habitat</div><div class="modal-field-value" id="modal-habitat"></div></div>
      <div class="modal-field"><div class="modal-field-label">Taille</div><div class="modal-field-value" id="modal-taille"></div></div>
      <div class="modal-field"><div class="modal-field-label">Statut</div><div class="modal-field-value" id="modal-statut"></div></div>
      <div class="modal-field modal-desc"><div class="modal-field-label">Notes de terrain</div><div class="modal-field-value" id="modal-desc"></div></div>
    </div>
    <button class="unlock-from-modal-btn" id="modal-unlock-btn" onclick="startUnlockFlow()">⬡ MARQUER COMME DÉCOUVERT</button>
  </div>
</div>

<script>

let currentFilter='all', selectedSpecies=null;

function getData() {
  try { return JSON.parse(localStorage.getItem('herpeto_v3')||'{"unlocked":[],"photos":{}}'); }
  catch(e){ return {unlocked:[],photos:{}}; }
}
function saveData(d){ try{ localStorage.setItem('herpeto_v3',JSON.stringify(d)); }catch(e){} }

let DATA = getData();

function updateStats(){
  const c=DATA.unlocked.length, t=SPECIES.length, p=Math.round(c/t*100);
  document.getElementById('discovered-count').textContent=c;
  document.getElementById('total-count').textContent=t;
  document.getElementById('progress-pct').textContent=p+'%';
  const r=29, circ=2*Math.PI*r;
  document.getElementById('progress-circle').style.strokeDasharray=circ;
  document.getElementById('progress-circle').style.strokeDashoffset=circ-(p/100)*circ;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const search=document.getElementById('search').value.toLowerCase().trim();
  grid.innerHTML=''; let count=0;
  SPECIES.forEach(sp=>{
    const isUnlocked=DATA.unlocked.includes(sp.id);
    const hasPhoto=!!DATA.photos[sp.id];
    if(currentFilter==='reptile'&&sp.type!=='reptile')return;
    if(currentFilter==='amphibien'&&sp.type!=='amphibien')return;
    if(currentFilter==='invasive'&&sp.type!=='invasive')return;
    if(currentFilter==='unlocked'&&!isUnlocked)return;
    if(currentFilter==='locked'&&isUnlocked)return;
    if(search&&!sp.name.toLowerCase().includes(search)&&!sp.latin.toLowerCase().includes(search))return;
    count++;
    const card=document.createElement('div');
    card.className=`card ${isUnlocked?'unlocked':'locked'}`;
    card.id=`card-${sp.id}`;
    const tagClass=sp.type==='invasive'?'tag-invasive':`tag-${sp.type}`;
    const tagLabel=sp.type==='invasive'?'INVASIVE':sp.type.toUpperCase();
    card.innerHTML=`
      <div class="card-number">#${String(sp.id).padStart(3,'0')}</div>
      <div class="card-img">
        ${isUnlocked
          ? hasPhoto
            ? `<img src="${DATA.photos[sp.id]}" alt="${sp.name}">`
            : `<div class="species-emoji">${sp.emoji}</div>`
          : `<div class="locked-question">?</div><div class="locked-icon">🔒</div>`}
        ${isUnlocked&&hasPhoto?'<div class="photo-badge">📷 PHOTO</div>':''}
      </div>
      <div class="card-info">
        <div class="card-name">${isUnlocked?sp.name:'???'}</div>
        <div class="card-latin">${isUnlocked?sp.latin:'??????????'}</div>
        <div class="card-tags">${isUnlocked?`<span class="tag ${tagClass}">${tagLabel}</span>`:'<span class="tag tag-locked">INCONNU</span>'}</div>
      </div>`;
    card.onclick=()=>isUnlocked?openModal(sp):openLockedModal(sp);
    grid.appendChild(card);
  });
  if(!count) grid.innerHTML='<div class="empty-state">// AUCUN RÉSULTAT</div>';
}

// ═══ MODAL ═══
function openModal(sp){
  selectedSpecies=sp;
  const photo=DATA.photos[sp.id];
  const photoArea=document.getElementById('modal-photo-area');
  const photoImg=document.getElementById('modal-photo-img');
  const photoEmoji=document.getElementById('modal-photo-emoji');
  if(photo){ photoImg.src=photo; photoImg.style.display='block'; photoEmoji.style.display='none'; }
  else { photoImg.style.display='none'; photoEmoji.style.display='block'; photoEmoji.textContent=sp.emoji; }
  document.getElementById('photo-upload-zone').style.display='block';
  document.getElementById('modal-emoji-sm').textContent=sp.emoji;
  document.getElementById('modal-number').textContent=`// ESPÈCE #${String(sp.id).padStart(3,'0')}`;
  document.getElementById('modal-name').textContent=sp.name;
  document.getElementById('modal-latin').textContent=sp.latin;
  document.getElementById('modal-type').textContent=sp.type.charAt(0).toUpperCase()+sp.type.slice(1);
  document.getElementById('modal-habitat').textContent=sp.habitat;
  document.getElementById('modal-taille').textContent=sp.taille;
  document.getElementById('modal-statut').textContent=sp.statut;
  document.getElementById('modal-desc').textContent=sp.desc;
  document.getElementById('modal-unlock-btn').style.display='none';
  document.getElementById('modal-overlay').classList.add('open');
}

function openLockedModal(sp){
  selectedSpecies=sp;
  document.getElementById('modal-photo-img').style.display='none';
  document.getElementById('modal-photo-emoji').style.display='block';
  document.getElementById('modal-photo-emoji').textContent='❓';
  document.getElementById('photo-upload-zone').style.display='none';
  document.getElementById('modal-emoji-sm').textContent='❓';
  document.getElementById('modal-number').textContent=`// ESPÈCE #${String(sp.id).padStart(3,'0')}`;
  document.getElementById('modal-name').textContent='???';
  document.getElementById('modal-latin').textContent='Non découverte';
  document.getElementById('modal-type').textContent='—';
  document.getElementById('modal-habitat').textContent='—';
  document.getElementById('modal-taille').textContent='—';
  document.getElementById('modal-statut').textContent='—';
  document.getElementById('modal-desc').textContent='Cette espèce n\'a pas encore été observée. Explorez Zagreb pour la découvrir !';
  document.getElementById('modal-unlock-btn').style.display='block';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e){ if(e.target.id==='modal-overlay')closeModalBtn(); }
function closeModalBtn(){ document.getElementById('modal-overlay').classList.remove('open'); selectedSpecies=null; }

// ═══ COMPRESSION IMAGE (évite le crash localStorage) ═══
function compressAndStore(file, speciesId, callback){
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const MAX=800;
    let w=img.width, h=img.height;
    if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    const dataUrl=canvas.toDataURL('image/jpeg',0.75);
    URL.revokeObjectURL(url);
    DATA.photos[speciesId]=dataUrl;
    saveData(DATA);
    if(callback) callback(dataUrl);
  };
  img.src=url;
}

// ═══ PHOTO UPLOAD (depuis fiche espèce déjà débloquée) ═══
function handlePhotoUpload(e){
  const file=e.target.files[0]; if(!file||!selectedSpecies)return;
  compressAndStore(file, selectedSpecies.id, (dataUrl)=>{
    const photoImg=document.getElementById('modal-photo-img');
    const photoEmoji=document.getElementById('modal-photo-emoji');
    photoImg.src=dataUrl; photoImg.style.display='block'; photoEmoji.style.display='none';
    renderGrid();
  });
}

// ═══ UNLOCK FLOW ═══
function startUnlockFlow(){
  if(!selectedSpecies)return;
  // Remplace le bouton par deux options directement dans la modale
  const btn=document.getElementById('modal-unlock-btn');
  btn.insertAdjacentHTML('afterend',`
    <div id="unlock-choice" style="display:flex;gap:10px;margin:0 22px 18px;">
      <label style="flex:1;padding:10px;background:rgba(0,207,255,0.08);border:1px solid var(--accent2);color:var(--accent2);font-family:'Orbitron',monospace;font-size:0.6rem;font-weight:700;letter-spacing:2px;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;">
        📷 AJOUTER PHOTO
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleUnlockWithPhoto(event)">
      </label>
      <button onclick="handleUnlockNoPhoto()" style="flex:1;padding:10px;background:rgba(0,255,136,0.08);border:1px solid var(--accent);color:var(--accent);font-family:'Orbitron',monospace;font-size:0.6rem;font-weight:700;letter-spacing:2px;cursor:pointer;">
        ⬡ SANS PHOTO
      </button>
    </div>`);
  btn.style.display='none';
}

function handleUnlockWithPhoto(e){
  const file=e.target.files[0];
  const sp=selectedSpecies;
  closeModalBtn();
  if(file){
    compressAndStore(file, sp.id, (dataUrl)=>{ triggerUnlock(sp, dataUrl); });
  } else {
    triggerUnlock(sp, null);
  }
}

function handleUnlockNoPhoto(){
  const sp=selectedSpecies;
  closeModalBtn();
  triggerUnlock(sp, null);
}

function triggerUnlock(sp, photoData){
  if(DATA.unlocked.includes(sp.id))return;
  DATA.unlocked.push(sp.id);
  if(photoData) DATA.photos[sp.id]=photoData;
  saveData(DATA);
  updateStats();
  showUnlockAnimation(sp, photoData);
}

// ═══ UNLOCK ANIMATION ═══
function showUnlockAnimation(sp, photoData){
  const overlay=document.getElementById('unlock-overlay');
  const bg=document.getElementById('unlock-bg');
  const card=document.getElementById('unlock-card');
  const ring1=document.getElementById('ring1');
  const ring2=document.getElementById('ring2');
  const particles=document.getElementById('unlock-particles');

  // fill data
  document.getElementById('unlock-emoji-big').textContent=sp.emoji;
  document.getElementById('unlock-number').textContent=`// ESPÈCE #${String(sp.id).padStart(3,'0')}`;
  document.getElementById('unlock-name').textContent=sp.name;
  document.getElementById('unlock-latin').textContent=sp.latin;
  document.getElementById('unlock-habitat').textContent=sp.habitat;
  document.getElementById('unlock-taille').textContent=sp.taille;

  // photo
  const unlockPhoto=document.getElementById('unlock-photo');
  const unlockEmoji=document.getElementById('unlock-emoji-big');
  if(photoData){
    unlockPhoto.src=photoData;
    unlockPhoto.style.display='block';
    unlockPhoto.classList.remove('loaded');
    unlockPhoto.onload=()=>{ unlockEmoji.style.display='none'; unlockPhoto.classList.add('loaded'); };
  } else {
    unlockPhoto.style.display='none';
    unlockEmoji.style.display='block';
  }

  // reset
  bg.style.animation='none'; card.style.animation='none';
  ring1.style.animation='none'; ring2.style.animation='none';
  particles.innerHTML='';
  overlay.style.opacity='0';
  void overlay.offsetWidth;

  // create particles
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*360, dist=100+Math.random()*200;
    const x=50+Math.cos(angle*Math.PI/180)*dist/window.innerWidth*100;
    const y=50+Math.sin(angle*Math.PI/180)*dist/window.innerHeight*100;
    const size=2+Math.random()*6;
    p.style.cssText=`
      left:50%;top:50%;width:${size}px;height:${size}px;
      background:${Math.random()>0.5?'var(--accent)':'var(--accent2)'};
      border-radius:${Math.random()>0.5?'50%':'0'};
      animation:particleFly${i%3} ${0.8+Math.random()*0.6}s ease-out ${Math.random()*0.3}s forwards;
    `;
    particles.appendChild(p);
  }

  // inject particle keyframes
  let styleEl=document.getElementById('particle-style');
  if(!styleEl){ styleEl=document.createElement('style'); styleEl.id='particle-style'; document.head.appendChild(styleEl); }
  styleEl.textContent=`
    @keyframes particleFly0{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + ${-150+Math.random()*300}px),calc(-50% + ${-150+Math.random()*300}px)) scale(0)}}
    @keyframes particleFly1{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + ${-150+Math.random()*300}px),calc(-50% + ${-150+Math.random()*300}px)) scale(0)}}
    @keyframes particleFly2{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + ${-150+Math.random()*300}px),calc(-50% + ${-150+Math.random()*300}px)) scale(0)}}
  `;

  overlay.style.opacity='1';
  overlay.classList.add('active');

  // sequence
  bg.style.animation='bgFadeIn 0.4s ease forwards';
  setTimeout(()=>{ ring1.style.animation='ringBurst 0.8s ease-out forwards'; },100);
  setTimeout(()=>{ ring2.style.animation='ringBurst 1s ease-out forwards'; },200);
  setTimeout(()=>{ card.style.animation='cardReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards'; },350);

  let styleEl2=document.getElementById('anim-style');
  if(!styleEl2){ styleEl2=document.createElement('style'); styleEl2.id='anim-style'; document.head.appendChild(styleEl2); }
  styleEl2.textContent=`
    @keyframes bgFadeIn{0%{opacity:0}100%{opacity:1}}
    @keyframes ringBurst{0%{opacity:0.8;transform:scale(0)}60%{opacity:0.4}100%{opacity:0;transform:scale(1)}}
    @keyframes cardReveal{0%{opacity:0;transform:scale(0.3) rotateY(180deg)}60%{transform:scale(1.05) rotateY(-5deg)}100%{opacity:1;transform:scale(1) rotateY(0deg)}}
  `;
}

function closeUnlockAnim(){
  const overlay=document.getElementById('unlock-overlay');
  overlay.style.transition='opacity 0.4s';
  overlay.style.opacity='0';
  setTimeout(()=>{ overlay.classList.remove('active'); renderGrid(); },400);
}

function setFilter(type,btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

updateStats();
renderGrid();
</script>
